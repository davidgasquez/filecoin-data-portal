collections:
  fdp:
    path: .
    pattern: "{**/*.{md,py,sql,toml,yml,yaml,json},**/Makefile,**/AGENTS.md}"
    context:
      "": FDP codebase for a minimal Filecoin open data platform, including orchestration code, assets, tests, and repository-specific documentation.

  builtin-actors:
    path: .qmd/external
    pattern: "{builtin-actors/**/*.{md,rs,toml,yml,yaml,json},builtin-actors/**/Makefile}"
    update: "[ -d builtin-actors/.git ] && git -C builtin-actors pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/builtin-actors.git builtin-actors"
    context:
      "": Filecoin builtin actors source of truth, including actor implementations, state transitions, and protocol-level behavior.

  lotus:
    path: .qmd/external
    pattern: "{lotus/**/*.{md,go,sh,toml,yml,yaml,json},lotus/**/Makefile}"
    update: "[ -d lotus/.git ] && git -C lotus pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/lotus.git lotus"
    context:
      "": Lotus reference Filecoin client implementation, including chain logic, APIs, node behavior, markets, storage, and operational documentation.

  lily:
    path: .qmd/external
    pattern: "{lily/**/*.{md,go,sql,sh,toml,yml,yaml,json},lily/**/Makefile}"
    update: "[ -d lily/.git ] && git -C lily pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/lily.git lily"
    context:
      "": Lily data extraction and indexing code for Filecoin, including tasks, schemas, models, chain data processing, and dataset-oriented documentation.

  filecoin-docs:
    path: .qmd/external
    pattern: "{filecoin-docs/**/*.{md,mdx,ts,js,json,toml,yml,yaml},filecoin-docs/**/Makefile}"
    update: "[ -d filecoin-docs/.git ] && git -C filecoin-docs pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/filecoin-docs.git filecoin-docs"
    context:
      "": Official Filecoin documentation covering concepts, protocol details, tooling, and user/developer guides.

  filecoin-services:
    path: .qmd/external
    pattern: "{filecoin-services/**/*.{md,sol,sh,js,toml,yml,yaml,json},filecoin-services/**/Makefile}"
    update: "[ -d filecoin-services/.git ] && git -C filecoin-services pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/filecoin-services.git filecoin-services"
    context:
      "": Filecoin Onchain Cloud repository for onchain programmable services, centered on smart contracts, deployment tooling, tests, specs, and operational docs for warm storage and related services.

  filecoin-pay:
    path: .qmd/external
    pattern: "{filecoin-pay/**/*.{md,sol,sh,toml,yml,yaml,json},filecoin-pay/**/Makefile}"
    update: "[ -d filecoin-pay/.git ] && git -C filecoin-pay pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/filecoin-pay.git filecoin-pay"
    context:
      "": Filecoin Onchain Cloud payment rails and settlement contracts, including Solidity sources, tests, specs, audits references, and deployment tooling for Filecoin Pay.

  synapse-sdk:
    path: .qmd/external
    pattern: "{synapse-sdk/**/*.{md,mdx,ts,tsx,js,mjs,html,css,json,jsonc,toml,yml,yaml},synapse-sdk/**/Makefile,synapse-sdk/**/AGENTS.md}"
    update: "[ -d synapse-sdk/.git ] && git -C synapse-sdk pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/synapse-sdk.git synapse-sdk"
    context:
      "": Filecoin Onchain Cloud JavaScript and React SDK monorepo for Synapse, including packages, examples, docs site content, and developer workflows.

  pdp:
    path: .qmd/external
    pattern: "{pdp/**/*.{md,sol,sh,toml,yml,yaml,json},pdp/**/Makefile,pdp/**/configure}"
    update: "[ -d pdp/.git ] && git -C pdp pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/pdp.git pdp"
    context:
      "": Filecoin Onchain Cloud provable data possession contracts and tools, including verifier and service contracts, tests, deployment scripts, and design documentation.
