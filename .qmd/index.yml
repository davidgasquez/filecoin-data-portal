collections:
  fdp:
    path: .
    pattern: "{**/*.{md,py,sql,toml,yml,yaml,json},**/Makefile,**/AGENTS.md}"
    ignore:
      - "web/src/data/generated/**"
      - "web/public/assets/**"
      - "web/deweb-local-sample/**"
      - "**/package-lock.json"
      - "**/pnpm-lock.yaml"
      - "**/bun.lock"
    context:
      "": FDP codebase for a minimal Filecoin open data platform, including orchestration code, assets, tests, and repository-specific documentation.
  builtin-actors:
    path: .qmd/external
    pattern: "{builtin-actors/**/*.{md,rs,sol,fe,eas,sh,toml,yml,yaml,json},builtin-actors/**/Makefile,builtin-actors/**/Dockerfile}"
    update: "[ -d builtin-actors/.git ] && git -C builtin-actors pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/builtin-actors.git builtin-actors"
    context:
      "": Filecoin builtin actors source of truth, including actor implementations, state transitions, and protocol-level behavior.
  lotus:
    path: .qmd/external
    pattern: "{lotus/**/*.{md,go,sol,sql,sh,bash,py,asm,template,tmpl,html,css,service,conf,toml,yml,yaml,json},lotus/**/Makefile,lotus/**/Dockerfile,lotus/**/go.mod,lotus/GO_VERSION_MIN,lotus/scripts/bash-completion/lotus,lotus/scripts/zsh-completion/lotus,lotus/scripts/dev/drop-local-repos,lotus/scripts/dev/gen-daemon,lotus/scripts/dev/sminer-init,lotus/scripts/mkreleaselog}"
    update: "[ -d lotus/.git ] && git -C lotus pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/lotus.git lotus"
    context:
      "": Lotus reference Filecoin client implementation, including chain logic, APIs, node behavior, markets, storage, and operational documentation.
  lily:
    path: .qmd/external
    pattern: "{lily/**/*.{md,go,sql,sh,template,tpl,mod,env,toml,yml,yaml,json},lily/**/Makefile,lily/deployment/.env.example,lily/scripts/fiximports,lily/build/grafana/config.monitoring}"
    update: "[ -d lily/.git ] && git -C lily pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/lily.git lily"
    context:
      "": Lily data extraction and indexing code for Filecoin, including tasks, schemas, models, chain data processing, and dataset-oriented documentation.
  forest:
    path: .qmd/external
    pattern: "{forest/**/*.{md,mdx,rs,go,sh,js,ts,tsx,css,rb,py,sol,proto,tpl,toml,yml,yaml,json,dockerfile},forest/**/Makefile,forest/**/go.mod,forest/**/go.work,forest/**/Dockerfile*}"
    update: "[ -d forest/.git ] && git -C forest pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/ChainSafe/forest.git forest"
    context:
      "": Forest Filecoin client implementation in Rust, including node behavior, chain sync, state management, RPC, tooling, and operational documentation.
  filecoin-docs:
    path: .qmd/external
    pattern: "{filecoin-docs/**/*.{md,mdx,ts,js,mjs,sh,json,toml,yml,yaml},filecoin-docs/**/Makefile}"
    update: "[ -d filecoin-docs/.git ] && git -C filecoin-docs pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/filecoin-docs.git filecoin-docs"
    context:
      "": Official Filecoin documentation covering concepts, protocol details, tooling, and user/developer guides.
  fips:
    path: .qmd/external
    pattern: "{fips/**/*.{md,go,sh,py,ipynb,json,toml,yml,yaml},fips/**/Makefile}"
    update: "[ -d fips/.git ] && git -C fips pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/filecoin-project/FIPs.git fips"
    context:
      "": Filecoin Improvement Proposals and Filecoin Runtime Component specs, including accepted and draft protocol changes, standards, rationale, and proposal process docs.
  filecoin-services:
    path: .qmd/external
    pattern: "{filecoin-services/**/*.{md,sol,sh,js,jq,toml,yml,yaml,json},filecoin-services/**/Makefile,filecoin-services/.gitmodules}"
    update: "[ -d filecoin-services/.git ] && git -C filecoin-services pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/filecoin-services.git filecoin-services"
    context:
      "": Filecoin Onchain Cloud repository for onchain programmable services, centered on smart contracts, deployment tooling, tests, specs, and operational docs for warm storage and related services.
  porep-market:
    path: .qmd/external
    pattern: "{porep-market/**/*.{md,sol,sh,py,toml,yml,yaml,json},porep-market/**/Makefile,porep-market/**/justfile,porep-market/**/remappings.txt,porep-market/**/.env.example}"
    update: "[ -d porep-market/.git ] && git -C porep-market pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/fidlabs/porep-market.git porep-market"
    context:
      "": FIDLabs PoRep Market smart contracts and tooling, including Solidity sources, tests, deployment scripts, ABIs, and documentation for storage-provider deal allocation and validation workflows.
  filecoin-pay:
    path: .qmd/external
    pattern: "{filecoin-pay/**/*.{md,sol,sh,toml,yml,yaml,json},filecoin-pay/**/Makefile,filecoin-pay/.gitmodules}"
    update: "[ -d filecoin-pay/.git ] && git -C filecoin-pay pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/filecoin-pay.git filecoin-pay"
    context:
      "": Filecoin Onchain Cloud payment rails and settlement contracts, including Solidity sources, tests, specs, audits references, and deployment tooling for Filecoin Pay.
  synapse-sdk:
    path: .qmd/external
    pattern: "{synapse-sdk/**/*.{md,mdx,ts,tsx,js,mjs,astro,html,css,json,jsonc,webmanifest,toml,yml,yaml},synapse-sdk/**/Makefile,synapse-sdk/**/AGENTS.md,synapse-sdk/**/_headers}"
    update: "[ -d synapse-sdk/.git ] && git -C synapse-sdk pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/synapse-sdk.git synapse-sdk"
    context:
      "": Filecoin Onchain Cloud JavaScript and React SDK monorepo for Synapse, including packages, examples, docs site content, and developer workflows.
  pdp:
    path: .qmd/external
    pattern: "{pdp/**/*.{md,sol,sh,toml,yml,yaml,json},pdp/**/Makefile,pdp/**/configure,pdp/.gitmodules}"
    update: "[ -d pdp/.git ] && git -C pdp pull --ff-only || GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --single-branch --no-tags https://github.com/FilOzone/pdp.git pdp"
    context:
      "": Filecoin Onchain Cloud provable data possession contracts and tools, including verifier and service contracts, tests, deployment scripts, and design documentation.
