name: Allocator Allowances Debug

on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  allocator-allowances-debug:
    name: Allocator Allowances Debug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy
    env:
      DATABASE_PATH: ${{ secrets.DATABASE_PATH }}
      motherduck_token: ${{ secrets.motherduck_token }}
      ASSET_SELECTION: "*,-raw_filecoin_state_market_deals,-filecoin_state_market_deals"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Show Python version
        run: uv run python -V

      - name: Prepare dbt manifest
        run: uv run dagster-dbt project prepare-and-package --file fdp/dbt/resources.py

      - name: Show selected assets
        run: uv run dagster asset list -m fdp.definitions --select "$ASSET_SELECTION"

      - name: Materialize selected assets
        run: |
          set -e
          tmp=$(mktemp)
          trap 'rm -f "$tmp"' EXIT
          printf '%s\n' \
            'execution:' \
            '  config:' \
            '    multiprocess:' \
            '      max_concurrent: 1' > "$tmp"
          uv run dagster asset materialize \
            --select "$ASSET_SELECTION" \
            --config "$tmp" \
            -m fdp.definitions
