name: Pipeline

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 14 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: Pipeline
    runs-on: ubuntu-latest
    env:
      ENCODED_GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.ENCODED_GOOGLE_APPLICATION_CREDENTIALS }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      FDP_GSHEET_SPREADSHEET_ID: ${{ secrets.FDP_GSHEET_SPREADSHEET_ID }}
      OSO_API_KEY: ${{ secrets.OSO_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore DuckDB cache
        uses: actions/cache/restore@v5
        with:
          path: fdp.duckdb
          key: duckdb-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            duckdb-${{ github.ref_name }}-
            duckdb-main-

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Check assets
        run: uv run fdp check

      - name: Prune tables
        run: uv run fdp prune

      - name: Materialize
        run: uv run fdp materialize

      - name: Verify status
        run: uv run fdp status

      - name: Run data tests
        run: uv run fdp test

      - name: Generate FDP docs
        run: uv run fdp docs --out build/fdp-docs

      - name: Upload FDP docs
        uses: actions/upload-artifact@v4
        with:
          name: fdp-docs
          path: build/fdp-docs
          retention-days: 30

      - name: Publish to R2
        run: uv run fdp publish r2

      - name: Publish to Google Sheets
        run: uv run fdp publish gsheet

      - name: Save DuckDB cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: fdp.duckdb
          key: duckdb-${{ github.ref_name }}-${{ github.run_id }}
