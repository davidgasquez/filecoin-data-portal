name: Next

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 14 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  next:
    name: Next
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ENCODED_GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.ENCODED_GOOGLE_APPLICATION_CREDENTIALS }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore DuckDB cache
        uses: actions/cache/restore@v5
        with:
          path: |
            fdp.duckdb
          key: duckdb-${{ github.run_id }}
          restore-keys: |
            duckdb-

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Check assets
        run: uv run fdp check

      - name: Prune tables
        run: uv run fdp prune

      - name: Materialize
        run: uv run fdp materialize

      - name: Verify status
        run: uv run fdp status

      - name: Run data tests
        run: uv run fdp test

      - name: Publish to R2
        run: uv run fdp publish r2

      - name: Build docs
        run: uv run fdp docs --out web/public

      - name: Commit docs
        run: |
          if git diff --quiet -- web/public; then
            echo "No docs changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public
          git commit -m "📝 Update agent docs"
          git push origin HEAD:${{ github.ref_name }}

      - name: Save DuckDB cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            fdp.duckdb
          key: duckdb-${{ github.run_id }}
