name: Website

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Pipeline"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  website:
    name: Website
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore DuckDB cache
        uses: actions/cache/restore@v5
        with:
          path: fdp.duckdb
          key: duckdb-${{ github.event.workflow_run.id || github.run_id }}
          restore-keys: duckdb-

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build FDP docs
        run: |
          test -f fdp.duckdb
          rm -rf web/.generated/fdp-docs/raw
          uv run fdp docs --out web/.generated/fdp-docs/raw
          test -f web/.generated/fdp-docs/raw/SKILL.md
          test -d web/.generated/fdp-docs/raw/assets

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefix web

      - name: Build
        run: npm run build --prefix web

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: fbe814d4a37d3d3d7fcfeec0ab929ff6
          command: pages deploy web/dist --project-name=filecoindataportal --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
